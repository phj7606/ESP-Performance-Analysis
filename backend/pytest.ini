[pytest]
# pytest-asyncio: 모든 async 테스트 함수를 자동으로 비동기로 실행
asyncio_mode = auto
# 테스트 파일 탐색 경로
testpaths = tests
# app 모듈 임포트를 위한 경로 추가 (docker compose exec backend python -m pytest 시 자동 적용)
pythonpath = /app
# 테스트 종료 코드에 영향을 주지 않는 경고 필터
filterwarnings =
    ignore:.*Replacing the event_loop fixture.*:DeprecationWarning
    ignore:.*event_loop fixture provided by pytest-asyncio.*:DeprecationWarning
